<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-Device Tester — MDT</title>
  <meta name="description" content="Run and interact with multiple Android apps side-by-side in headless emulators with live color-coded logs." />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- ── Top bar ──────────────────────────────────────────────────────────── -->
<header id="topbar" role="banner">
  <div class="logo">
    <!-- Android-ish phone icon -->
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/>
    </svg>
    Multi-Device Tester
    <span class="sub">MDT</span>
  </div>

  <div class="spacer"></div>

  <span id="global-status" class="status-pill">Initializing…</span>
  <span id="log-dir-note" class="log-dir-note" title="">Logs: logs/</span>
  <span id="apk-dir-note" class="log-dir-note" title="">APKs: apk_input/</span>

  <button id="btn-set-apk-dir" class="btn btn-ghost btn-sm" title="Set APK source folder">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h5l2 2h11v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
    APK Folder
  </button>

  <button id="btn-restart-all"  class="btn btn-ghost btn-sm" title="Restart all apps">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg>
    Restart All
  </button>
  <button id="btn-reinstall-all" class="btn btn-ghost btn-sm">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
    Reinstall All
  </button>
  <button id="btn-clear-logs"   class="btn btn-ghost btn-sm">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    Clear Logs
  </button>
</header>

<!-- ── Main grid ────────────────────────────────────────────────────────── -->
<main id="main-grid" role="main" aria-label="Device panels"></main>

<!-- ── Toast notifications ──────────────────────────────────────────────── -->
<div id="toast-container" aria-live="polite" aria-atomic="false"></div>

<script src="/static/app.js"></script>
</body>
</html>
